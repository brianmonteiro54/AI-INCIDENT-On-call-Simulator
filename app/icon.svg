<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1CB0F6"/>
      <stop offset="1" stop-color="#1899D6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (OS rounds corners; safe for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Mascot (happy), centered inside the maskable safe zone -->
  <g transform="translate(106,98) scale(1.875)">
    <!-- Antenna — red dot signals "incident" -->
    <line x1="80" y1="26" x2="80" y2="44" stroke="#3C3C3C" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="80" cy="22" r="6.5" fill="#FF4B4B" stroke="#3C3C3C" stroke-width="2"/>

    <!-- Body -->
    <rect x="32" y="50" width="96" height="92" rx="22" ry="22" fill="#FF9600" stroke="#3C3C3C" stroke-width="3.5"/>
    <rect x="38" y="56" width="84" height="10" rx="5" fill="#FFB347" opacity="0.6"/>

    <!-- Face panel -->
    <rect x="46" y="68" width="68" height="44" rx="12" ry="12" fill="#FFFBEF" stroke="#3C3C3C" stroke-width="2.5"/>

    <!-- Eyes -->
    <circle cx="64" cy="80" r="4.5" fill="#3C3C3C"/>
    <circle cx="96" cy="80" r="4.5" fill="#3C3C3C"/>
    <circle cx="65.5" cy="78.5" r="1.5" fill="white"/>
    <circle cx="97.5" cy="78.5" r="1.5" fill="white"/>

    <!-- Cheeks -->
    <ellipse cx="55" cy="95" rx="5" ry="3" fill="#FF6B9D" opacity="0.7"/>
    <ellipse cx="105" cy="95" rx="5" ry="3" fill="#FF6B9D" opacity="0.7"/>

    <!-- Happy mouth -->
    <path d="M 66 100 Q 80 110, 94 100" stroke="#3C3C3C" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Arms -->
    <rect x="18" y="74" width="16" height="44" rx="8" fill="#FF9600" stroke="#3C3C3C" stroke-width="3"/>
    <rect x="126" y="74" width="16" height="44" rx="8" fill="#FF9600" stroke="#3C3C3C" stroke-width="3"/>
    <circle cx="26" cy="120" r="9" fill="#FF9600" stroke="#3C3C3C" stroke-width="3"/>
    <circle cx="134" cy="120" r="9" fill="#FF9600" stroke="#3C3C3C" stroke-width="3"/>

    <!-- Feet -->
    <ellipse cx="58" cy="148" rx="14" ry="7" fill="#3C3C3C"/>
    <ellipse cx="102" cy="148" rx="14" ry="7" fill="#3C3C3C"/>
  </g>
</svg>
