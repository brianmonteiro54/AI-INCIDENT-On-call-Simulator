<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFFBEF" />
    <title>Offline · AI Incident</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fffbef;
        color: #3c3c3c;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
        text-align: center;
      }
      .wrap { max-width: 28rem; }
      .emoji { font-size: 48px; line-height: 1; }
      h1 { margin: 16px 0 0; font-size: 26px; font-weight: 800; }
      p { margin: 8px 0 0; color: #777; line-height: 1.45; }
      button {
        margin-top: 24px;
        background: #58cc02;
        color: #fff;
        border: none;
        border-bottom: 4px solid #58a700;
        border-radius: 16px;
        padding: 14px 24px;
        font-weight: 800;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      button:active { border-bottom-width: 0; transform: translateY(4px); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="emoji">📡</div>
      <h1>Você está offline</h1>
      <p>
        Não rolou conexão pra carregar esta página. As missões que você já abriu
        continuam funcionando — volte pro início pra jogar offline.
      </p>
      <button onclick="location.href='/'">Voltar pro início</button>
    </div>
  </body>
</html>
